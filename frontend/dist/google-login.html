<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход – Google Аккаунты</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f0f11;
      color: #e3e3e3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #161619;
      border: 1px solid #2d2d34;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      padding: 36px 32px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .google-logo {
      width: 44px;
      height: 44px;
      background: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #a1a1aa;
      margin-bottom: 28px;
    }
    .account-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    .account-row {
      background: #1f1f23;
      border: 1px solid #2d2d34;
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }
    .account-row:hover {
      background: #27272c;
      border-color: #3f3f46;
      transform: translateY(-1px);
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #2563eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #ffffff;
      font-size: 14px;
    }
    .account-info {
      flex: 1;
    }
    .name {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
    }
    .email {
      font-size: 12px;
      color: #a1a1aa;
      margin-top: 2px;
    }
    .footer {
      font-size: 12px;
      color: #71717a;
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
    }
    .loading-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.05);
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card" id="login-card">
    <div class="logo-container">
      <div class="google-logo">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
        </svg>
      </div>
    </div>
    <h1>Вход с помощью Google</h1>
    <p>Выберите аккаунт для входа в Codex</p>

    <div class="account-list">
      <div class="account-row" onclick="selectAccount('lalna@gmail.com', 'lalna')">
        <div class="avatar" style="background-color: #818cf8;">L</div>
        <div class="account-info">
          <div class="name">lalna</div>
          <div class="email">lalna@gmail.com</div>
        </div>
      </div>
      <div class="account-row" onclick="selectAccount('developer@gmail.com', 'DevCoder')">
        <div class="avatar" style="background-color: #34d399;">D</div>
        <div class="account-info">
          <div class="name">DevCoder</div>
          <div class="email">developer@gmail.com</div>
        </div>
      </div>
      <div class="account-row" onclick="customAccount()">
        <div class="avatar" style="background-color: #52525b; font-size: 18px;">+</div>
        <div class="account-info">
          <div class="name" style="font-weight: 500; color: #a1a1aa;">Использовать другой аккаунт</div>
          <div class="email">Войти под другим email</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <span>Русский</span>
      <span style="display: flex; gap: 10px;">
        <a href="#" style="color: #71717a; text-decoration: none;">Справка</a>
        <a href="#" style="color: #71717a; text-decoration: none;">Конфиденциальность</a>
      </span>
    </div>
  </div>

  <div class="card loading-overlay" id="loading-card">
    <div class="spinner"></div>
    <div style="font-size: 15px; color: #ffffff;">Авторизация...</div>
    <div style="font-size: 12px; color: #a1a1aa;">Передача данных в Codex</div>
  </div>

  <script>
    function selectAccount(email, name) {
      document.getElementById('login-card').style.display = 'none';
      document.getElementById('loading-card').style.display = 'flex';

      setTimeout(() => {
        if (window.opener) {
          window.opener.postMessage({
            type: 'GOOGLE_LOGIN_SUCCESS',
            email: email,
            name: name
          }, window.location.origin);
        }
        window.close();
      }, 1000);
    }

    function customAccount() {
      const email = prompt("Введите email:", "student@gmail.com");
      if (!email) return;
      const name = email.split('@')[0];
      selectAccount(email, name);
    }
  </script>
</body>
</html>
